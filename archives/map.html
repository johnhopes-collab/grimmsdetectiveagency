title: '<a href="/archives.html">Archives</a> / Map'
---

<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/map.css">

<img src="{{ site.baseurl }}/assets/images/text/new-york-city.png" alt="NYC Title" class="page-title-ny">

<div class="map-block">
    <div class="map-container">
        <!-- Your combined image: map + Info-Matic in one -->
        <img id="base-map" src="{{ site.baseurl }}/assets/images/map/nyc-map.png" alt="NYC Map with Info-Matic">
        
        <!-- Borough overlays -->
        <img class="borough-overlay" id="manhattan" src="{{ site.baseurl }}/assets/images/map/manhattan-overlay.png" data-borough="Manhattan">
        <img class="borough-overlay" id="brooklyn" src="{{ site.baseurl }}/assets/images/map/brooklyn-overlay.png" data-borough="Brooklyn">
        <img class="borough-overlay" id="queens" src="{{ site.baseurl }}/assets/images/map/queens-overlay.png" data-borough="Queens">
        <img class="borough-overlay" id="bronx" src="{{ site.baseurl }}/assets/images/map/bronx-overlay.png" data-borough="Bronx">
        <img class="borough-overlay" id="staten-island" src="{{ site.baseurl }}/assets/images/map/staten-island-overlay.png" data-borough="Staten Island">
        
        <!-- Invisible canvas for pixel detection -->
        <canvas id="detection-canvas"></canvas>
        
        <!-- Info panel positioned over your Info-Matic screen area -->
        <div class="info-panel">
            <div class="info-content">
                <div class="text-rotator" id="title-rotator">
                    <h3 class="rotating-text" id="borough-name">Select a Borough</h3>
                </div>
                <div class="description-rotator" id="description-rotator">
                    <div class="rotating-description" id="borough-description">
                        Hover over a borough to see information
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<br>

<script>
// All the JavaScript code from before goes here
class BoroughDetector {
    constructor() {
        this.canvas = document.getElementById('detection-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.baseMap = document.getElementById('base-map');
        this.boroughs = document.querySelectorAll('.borough-overlay');
        this.currentBorough = null;
        this.selectedBorough = null;
        
        this.titleRotator = document.getElementById('title-rotator');
        this.descriptionRotator = document.getElementById('description-rotator');
        
        this.boroughData = {
            'Manhattan': 'The heart of NYC, home to Times Square, Central Park, and Wall Street. This densely packed island is the commercial and cultural center of the city, featuring world-famous landmarks like the Empire State Building, Broadway theaters, and numerous museums.',
            'Brooklyn': 'The most populous borough, known for the Brooklyn Bridge and diverse neighborhoods like Williamsburg, DUMBO, and Park Slope. Brooklyn has transformed from an industrial area into a hub of culture, art, and cuisine.',
            'Queens': 'The most ethnically diverse area in the world, home to two major airports and Flushing Meadows Corona Park. Queens offers authentic cuisine from virtually every culture, making it a food lover\'s paradise.',
            'Bronx': 'Home of Yankee Stadium and the Bronx Zoo, rich in culture and history. The birthplace of hip-hop, the Bronx has a vibrant arts scene and is home to the New York Botanical Garden.',
            'Staten Island': 'The most suburban borough, connected to Manhattan by the free Staten Island Ferry. Known for its parks, beaches, and more relaxed pace of life, Staten Island offers a different perspective on NYC living.'
        };
        
                this.init();
            }
            
            async init() {
                await this.setupCanvas();
                this.setupEventListeners();
            }
            
            async setupCanvas() {
                if (!this.baseMap.complete) {
                    await new Promise(resolve => {
                        this.baseMap.onload = resolve;
                    });
                }
                
                this.canvas.width = this.baseMap.offsetWidth;
                this.canvas.height = this.baseMap.offsetHeight;
                
                for (let borough of this.boroughs) {
                    if (!borough.complete) {
                        await new Promise(resolve => {
                            borough.onload = resolve;
                        });
                    }
                }
            }
            
            setupEventListeners() {
                this.canvas.addEventListener('mousemove', (e) => this.handleMouseMove(e));
                this.canvas.addEventListener('click', (e) => this.handleClick(e));
                this.canvas.addEventListener('mouseleave', () => this.handleMouseLeave());
            }
            
            getPixelData(x, y, boroughImg) {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.drawImage(boroughImg, 0, 0, this.canvas.width, this.canvas.height);
                
                const imageData = this.ctx.getImageData(x, y, 1, 1);
                const alpha = imageData.data[3];
                
                return alpha > 0;
            }
            
            handleMouseMove(e) {
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                let hoveredBorough = null;
                
                for (let borough of this.boroughs) {
                    if (this.getPixelData(x, y, borough)) {
                        hoveredBorough = borough;
                        break;
                    }
                }
                
                if (hoveredBorough !== this.currentBorough) {
                    if (this.currentBorough) {
                        this.currentBorough.classList.remove('hovered');
                    }
                    
                    if (hoveredBorough) {
                        hoveredBorough.classList.add('hovered');
                        this.canvas.style.cursor = 'pointer';
                        this.updateInfo(hoveredBorough.dataset.borough, false);
                    } else {
                        this.canvas.style.cursor = 'default';
                        if (!this.selectedBorough) {
                            this.updateInfo('Select a Borough', false);
                        }
                    }
                    
                    this.currentBorough = hoveredBorough;
                }
            }
            
            handleClick(e) {
                if (this.currentBorough) {
                    if (this.selectedBorough) {
                        this.selectedBorough.classList.remove('active');
                    }
                    
                    this.selectedBorough = this.currentBorough;
                    this.selectedBorough.classList.add('active');
                    
                    this.updateInfo(this.selectedBorough.dataset.borough, true);
                }
            }
            
            handleMouseLeave() {
                if (this.currentBorough) {
                    this.currentBorough.classList.remove('hovered');
                    this.currentBorough = null;
                }
                this.canvas.style.cursor = 'default';
                
                if (!this.selectedBorough) {
                    this.updateInfo('Select a Borough', false);
                }
            }
            
            // New method for rotating text animation
            rotateText(container, newContent, isTitle = false) {
                const currentElement = container.querySelector(isTitle ? '.rotating-text' : '.rotating-description');
                
                // Create new element
                const newElement = currentElement.cloneNode(false);
                if (isTitle) {
                    newElement.textContent = newContent;
                } else {
                    newElement.innerHTML = newContent;
                }
                
                // Position new element below viewport
                newElement.classList.add('slide-up-in');
                container.appendChild(newElement);
                
                // Force reflow
                newElement.offsetHeight;
                
                // Animate out current element
                currentElement.classList.add('slide-up-out');
                
                // Animate in new element
                setTimeout(() => {
                    newElement.classList.remove('slide-up-in');
                }, 10);
                
                // Clean up after animation
                setTimeout(() => {
                    if (currentElement.parentNode) {
                        currentElement.parentNode.removeChild(currentElement);
                    }
                    newElement.classList.remove('slide-up-out');
                }, 450); // Slightly longer than CSS transition
            }
            
            updateInfo(boroughName, isSelected) {
                let descriptionContent;
                
                if (isSelected && this.boroughData[boroughName]) {
                    descriptionContent = this.boroughData[boroughName];
                } else if (boroughName === 'Select a Borough') {
                    descriptionContent = 'Hover over a borough to see information';
                } else {
                    descriptionContent = 'Click to select this borough';
                }
                
                // Animate title change
                this.rotateText(this.titleRotator, boroughName, true);
                
                // Animate description change
                this.rotateText(this.descriptionRotator, descriptionContent, false);
            }
        }
        
        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new BoroughDetector();
        });
    </script>
