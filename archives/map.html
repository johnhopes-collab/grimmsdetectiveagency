---

<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/map.css">

<div class="map-block">
    <div class="map-container">
        <picture>
            <source media="(max-width: 500px)" srcset="{{ site.baseurl }}/assets/images/map/map-mobile.png">
            <img id="base-map" src="{{ site.baseurl }}/assets/images/map/nyc-map3.png" alt="NYC Map">
        </picture>
        <!-- Invisible canvas for pixel detection -->
        <canvas id="detection-canvas"></canvas>

        <picture>
            <source media="(max-width: 500px)" srcset="{{ site.baseurl }}/assets/images/map/mobile-manhattan.png">
            <img class="borough-overlay" id="manhattan" src="{{ site.baseurl }}/assets/images/map/manhattan-overlay2.png" alt="Manhattan">
        </picture>
        <picture>
            <source media="(max-width: 500px)" srcset="{{ site.baseurl }}/assets/images/map/mobile-brooklyn.png">
            <img class="borough-overlay" id="brooklyn" src="{{ site.baseurl }}/assets/images/map/brooklyn-overlay2.png" alt="Brooklyn">
        </picture>
        <picture>
            <source media="(max-width: 500px)" srcset="{{ site.baseurl }}/assets/images/map/mobile-queens.png">
            <img class="borough-overlay" id="queens" src="{{ site.baseurl }}/assets/images/map/queens-overlay2.png" alt="Queens">
        </picture>
        <picture>
            <source media="(max-width: 500px)" srcset="{{ site.baseurl }}/assets/images/map/mobile-bronx.png">
            <img class="borough-overlay" id="bronx" src="{{ site.baseurl }}/assets/images/map/bronx-overlay2.png" alt="The Bronx">
        </picture>
        <picture>
            <source media="(max-width: 500px)" srcset="{{ site.baseurl }}/assets/images/map/mobile-staten-island.png">
            <img class="borough-overlay" id="staten-island" src="{{ site.baseurl }}/assets/images/map/staten-island-overlay2.png" alt="Staten Island">
        </picture>
        <picture>
            <source media="(max-width: 500px)" srcset="{{ site.baseurl }}/assets/images/map/mobile-jersey-city.png">
            <img class="borough-overlay" id="jersey-city" src="{{ site.baseurl }}/assets/images/map/jersey-city-overlay2.png" alt="Jersey City">
        </picture>

        <!-- Info panel -->
        <div class="info-panel">
            <div class="info-content">
                <div class="text-rotator" id="title-rotator">
                    <h3 id="borough-name"></h3> <!-- Starts empty -->
                </div>
                <div class="description-rotator" id="description-rotator">
                    <div id="borough-description"></div> <!-- Starts empty -->
                </div>
            </div>
        </div>
    </div>
</div>

<br>

<script>
class BoroughDetector {
    constructor() {
        this.canvas = document.getElementById('detection-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.baseMap = document.getElementById('base-map');
        this.boroughs = document.querySelectorAll('.borough-overlay');
        this.currentBorough = null;
        this.selectedBorough = null;
        
        this.boroughData = {
            'Manhattan': 'The glittering center of power, money, and vice. Wall Street financiers, Broadway stars, luxury hotels, and Fifth Avenue mansions shared the island with overcrowded immigrant tenements and notorious gang neighborhoods like Hell\'s Kitchen and Little Italy. Speakeasies flourished behind respectable storefronts, politicians made deals in smoke-filled rooms, and corruption reached all the way from police precincts to City Hall.',
            'Brooklyn': 'A borough of working-class neighborhoods, docks, factories, and tight-knit immigrant communities. Italian, Irish, Jewish, and Eastern European families lived alongside one another as organized crime revolved around the waterfront, featuring labor unions, gambling, and protection rackets. Everyone in Brooklyn knows someone, loyalties run deep, and betrayals are remembered.',
            'Queens': 'Less urban and more suburban than today, Queens was a patchwork of villages, farmland, new housing developments, and industrial districts. It wasn\'t the epicenter of organized crime, making it useful as a place for hidden distilleries, discreet meetings, safe houses, or figures seeking distance from Manhattan\'s chaos.',
            'The Bronx': 'Growing rapidly, the Bronx represented upward mobility for many families leaving crowded Manhattan. New apartment buildings and parks gave it a more respectable appearance, but bootlegging and gang activity were never far away. Home of Yankee Stadium and the Bronx Zoo.',
            'Staten Island': 'Is it really even New York? It was thought of as a semi-rural, out-of-the-way place rather than an integral part of the bustling metropolis. While Manhattan was packed with skyscrapers, theaters, jazz clubs, and immigrants, Staten Island had farms, woodlands, and quiet residential communities, a place where the wealthy went to get away.',
            'Jersey City': 'Out side of NYC proper, at this time it was a gritty, industrial working-class town. It was full of rail yards, docks, warehouses, factories, and shipping terminals. Much of the freight moving into New York passed through Jersey City first. Known for its corrupt political machine run by Frank Hague, who dominated local politics from 1917 into the 1940s.'
        };
        
        this.init();
    }
    
    async init() {
        await this.setupCanvas();
        this.setupEventListeners();
    }
    
    async setupCanvas() {
        if (!this.baseMap.complete) {
            await new Promise(resolve => {
                this.baseMap.onload = resolve;
            });
        }
        
        this.canvas.width = this.baseMap.offsetWidth;
        this.canvas.height = this.baseMap.offsetHeight;
        
        for (let borough of this.boroughs) {
            if (!borough.complete) {
                await new Promise(resolve => {
                    borough.onload = resolve;
                });
            }
        }
    }
    
    setupEventListeners() {
        this.canvas.addEventListener('mousemove', (e) => this.handleMouseMove(e));
        this.canvas.addEventListener('click', (e) => this.handleClick(e));
        this.canvas.addEventListener('mouseleave', () => this.handleMouseLeave());
    }
    
    getPixelData(x, y, boroughImg) {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.ctx.drawImage(boroughImg, 0, 0, this.canvas.width, this.canvas.height);
        
        const imageData = this.ctx.getImageData(x, y, 1, 1);
        const alpha = imageData.data[3];
        
        return alpha > 0;
    }
    
    handleMouseMove(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        let hoveredBorough = null;
        
        for (let borough of this.boroughs) {
            if (this.getPixelData(x, y, borough)) {
                hoveredBorough = borough;
                break;
            }
        }
        
        // Update hover state and cursor
        if (hoveredBorough !== this.currentBorough) {
            if (this.currentBorough && !this.currentBorough.classList.contains('active')) {
                this.currentBorough.classList.remove('hovered');
            }
            
            if (hoveredBorough) {
                // Only add hover class if it's not already selected
                if (!hoveredBorough.classList.contains('active')) {
                    hoveredBorough.classList.add('hovered');
                }
                this.canvas.style.cursor = 'pointer';
            } else {
                this.canvas.style.cursor = 'default';
            }
            
            this.currentBorough = hoveredBorough;
        }
    }
    
    handleClick(e) {
        if (this.currentBorough) {
            // Remove previous selection
            if (this.selectedBorough) {
                this.selectedBorough.classList.remove('active');
            }
            
            // Set new selection
            this.selectedBorough = this.currentBorough;
            this.selectedBorough.classList.add('active');
            
            // Remove hover class from the now-selected borough since active takes precedence
            this.selectedBorough.classList.remove('hovered');
            
            // Update display with new borough info
            this.updateTitle(this.selectedBorough.dataset.borough);
            this.updateDescription(this.boroughData[this.selectedBorough.dataset.borough]);
        }
    }
    
    handleMouseLeave() {
        if (this.currentBorough && !this.currentBorough.classList.contains('active')) {
            this.currentBorough.classList.remove('hovered');
        }
        this.currentBorough = null;
        this.canvas.style.cursor = 'default';
    }
    
    updateTitle(newTitle) {
        const titleElement = document.getElementById('borough-name');
        
        // Animate out current title
        titleElement.style.transform = 'translateY(-100%)';
        
        // After animation, update content and animate in
        setTimeout(() => {
            titleElement.textContent = newTitle;
            titleElement.style.transform = 'translateY(100%)';
            
            // Force reflow then animate to normal position
            titleElement.offsetHeight;
            setTimeout(() => {
                titleElement.style.transform = 'translateY(0)';
            }, 10);
        }, 200);
    }
    
    updateDescription(newDescription) {
        const descElement = document.getElementById('borough-description');
        
        // Animate out current description
        descElement.style.transform = 'translateY(-100%)';
        
        // After animation, update content and animate in
        setTimeout(() => {
            descElement.textContent = newDescription;
            descElement.style.transform = 'translateY(100%)';
            
            // Force reflow then animate to normal position
            descElement.offsetHeight;
            setTimeout(() => {
                descElement.style.transform = 'translateY(0)';
            }, 10);
        }, 200);
    }
}

// Initialize when page loads
document.addEventListener('DOMContentLoaded', () => {
    new BoroughDetector();
});
</script>
